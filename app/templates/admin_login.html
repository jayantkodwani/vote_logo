{% extends "base.html" %}
{% block title %}Admin · Logo Vote{% endblock %}
{% block content %}
<style>
  .ad-login{max-width:380px; margin:8vh auto 0; background:var(--white); border:1px solid var(--line);
    border-radius:18px; padding:30px 28px; box-shadow:0 18px 40px -34px rgba(22,36,27,.5);}
  .ad-login h1{font-family:"Fraunces",serif; font-weight:600; font-size:1.6rem; margin:0 0 4px;}
  .ad-login p{color:var(--slate); font-size:.9rem; margin:0 0 18px;}
  .ad-login label{display:block; font-size:.78rem; color:var(--slate); font-weight:600; margin:0 0 6px;}
  .ad-login input{width:100%; border:1px solid var(--line); border-radius:11px; padding:12px 13px; font:inherit;}
  .ad-login input:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(24,66,36,.12);}
  .ad-login button{width:100%; margin-top:16px; background:var(--green); border:1px solid var(--green); color:#fff;
    font:inherit; font-weight:600; padding:12px; border-radius:11px; cursor:pointer;}
  .ad-login button:hover{background:var(--green-deep);}
  .ad-back{display:block; text-align:center; margin-top:14px; font-size:.82rem;}
</style>
<div class="ad-login">
  <h1>Admin access</h1>
  <p>Enter the admin password to view the vote results.</p>
  <form method="post" action="{{ url_for('main.admin') }}">
    <input type="hidden" name="csrf" value="{{ csrf_token() }}">
    <label for="pw">Password</label>
    <input type="password" id="pw" name="password" autofocus autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
  <a class="ad-back" href="{{ url_for('main.index') }}">&larr; Back to voting</a>
</div>
{% endblock %}
